[general]
# Default domain list file (one hostname per line, # = comment)
domains_file = domains.txt

[author]
name = Markus Gerber
email = dev@npn.ch

[titles]
# Main title used in HTML <title>, Excel properties and report headers
main_title = Your Name – Web Inventory Report

# Subtitle shown below the main title
subtitle = Automatisierte Website-Übersicht

# Excel sheet names
sheet_inventory = Web Inventory
sheet_summary = Zusammenfassung

[colors]
# Primary accent color (hex, without #)
primary   = af001d
dark      = 333333
white     = ffffff
light_bg  = f5f5f5
border    = dee2e6

[scan]
# Number of parallel browser workers
workers      = 4
# Timeout for page.goto() in milliseconds
goto_timeout = 15000
# Default page timeout in milliseconds
page_timeout = 30000
# SSL socket timeout in seconds
ssl_timeout  = 5
